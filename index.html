<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>PAUL_FMP Stream Overlay</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@400;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: transparent;
  font-family: 'Rajdhani', 'Exo 2', sans-serif;
}

.overlay-root {
  position: relative;
  width: 1080px;
  height: 1920px;
  overflow: hidden;
}

#particleCanvas {
  position: absolute;
  inset: 0;
  width: 1080px;
  height: 1920px;
  pointer-events: none;
  z-index: 0;
}

/* ── CORNER DECORATIONS ── */
.corner {
  position: absolute;
  width: 160px;
  height: 160px;
  pointer-events: none;
  z-index: 1;
}
.corner-tl { top: 0; left: 0; }
.corner-tr { top: 0; right: 0; transform: scaleX(-1); }
.corner-bl { bottom: 260px; left: 0; transform: scaleY(-1); }
.corner-br { bottom: 260px; right: 0; transform: scale(-1,-1); }
.corner svg { width: 100%; height: 100%; }

/* ── DIAGONAL ACCENT STRIPES ── */
.stripe-left, .stripe-right {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 8px;
  height: 320px;
  z-index: 1;
  pointer-events: none;
  animation: stripeGlow 3s ease-in-out infinite alternate;
}
.stripe-left  { left: 22px; }
.stripe-right { right: 22px; }

.stripe-left::before, .stripe-right::before,
.stripe-left::after,  .stripe-right::after {
  content: '';
  position: absolute;
  left: 0;
  width: 100%;
}
.stripe-left::before, .stripe-right::before {
  top: 0; height: 60%;
  background: linear-gradient(180deg, #b44fff, transparent);
  clip-path: polygon(0 0, 100% 12%, 100% 100%, 0 88%);
}
.stripe-left::after, .stripe-right::after {
  bottom: 0; height: 60%;
  background: linear-gradient(0deg, #00d4ff, transparent);
  clip-path: polygon(0 12%, 100% 0, 100% 88%, 0 100%);
}
@keyframes stripeGlow {
  from { opacity: 0.5; filter: brightness(0.8); }
  to   { opacity: 1;   filter: brightness(1.4) drop-shadow(0 0 8px #b44fff); }
}

/* ── TOP BAR ── */
.top-bar {
  position: absolute;
  top: 38px;
  left: 32px;
  right: 32px;
  height: 84px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 10;
}

.live-pill {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(0,0,0,0.72);
  border: 1.5px solid rgba(255,60,60,0.55);
  border-radius: 4px;
  padding: 10px 22px 10px 16px;
  clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
  box-shadow: 0 0 18px rgba(255,40,40,0.35), inset 0 0 12px rgba(255,40,40,0.08);
}

.live-dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #ff3030;
  box-shadow: 0 0 8px #ff3030, 0 0 20px #ff3030;
  animation: livePulse 1.4s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes livePulse {
  0%, 100% { transform: scale(1);    box-shadow: 0 0 8px #ff3030, 0 0 20px #ff3030; opacity: 1; }
  50%       { transform: scale(1.35); box-shadow: 0 0 14px #ff3030, 0 0 34px #ff5050; opacity: 0.85; }
}
.live-text {
  font-family: 'Exo 2', sans-serif;
  font-size: 30px;
  font-weight: 800;
  color: #ffffff;
  letter-spacing: 3px;
  text-shadow: 0 0 10px rgba(255,80,80,0.7);
}

.brand-logo {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  background: rgba(0,0,0,0.72);
  border: 1.5px solid rgba(0,212,255,0.4);
  border-radius: 4px;
  padding: 8px 20px;
  clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
  box-shadow: 0 0 18px rgba(0,212,255,0.3), inset 0 0 12px rgba(0,212,255,0.06);
}
.brand-name {
  font-family: 'Exo 2', sans-serif;
  font-size: 34px;
  font-weight: 900;
  color: #ffffff;
  letter-spacing: 4px;
  text-shadow: 0 0 14px #00d4ff, 0 0 30px rgba(0,212,255,0.5);
  line-height: 1;
}
.brand-sub {
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 500;
  color: #00d4ff;
  letter-spacing: 3px;
  opacity: 0.85;
  margin-top: 2px;
}

/* ── FOLLOW BADGE ── */
.follow-badge {
  position: absolute;
  top: 158px;
  right: 32px;
  z-index: 10;
  background: rgba(0,0,0,0.68);
  border: 1.5px solid rgba(180,79,255,0.55);
  border-radius: 4px;
  padding: 10px 20px;
  clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
  box-shadow: 0 0 16px rgba(180,79,255,0.35), inset 0 0 8px rgba(180,79,255,0.07);
  animation: badgeBounce 3.5s ease-in-out infinite;
  display: flex;
  align-items: center;
  gap: 10px;
}
@keyframes badgeBounce {
  0%, 45%, 55%, 100% { transform: translateY(0); }
  50%                 { transform: translateY(-6px); }
}
.badge-icon {
  font-size: 26px;
  line-height: 1;
  filter: drop-shadow(0 0 4px rgba(180,79,255,0.8));
}
.badge-text {
  font-family: 'Exo 2', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 2px;
  text-shadow: 0 0 10px rgba(180,79,255,0.7);
}

/* ── GIFT WIDGET ── */
.gift-widget {
  position: absolute;
  left: 32px;
  bottom: 340px;
  width: 388px;
  z-index: 10;
  background: rgba(0,0,0,0.80);
  border: 1.5px solid rgba(0,212,255,0.45);
  border-radius: 4px;
  padding: 22px 24px 18px;
  clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
  box-shadow: 0 0 24px rgba(0,212,255,0.28), inset 0 0 20px rgba(0,212,255,0.05);
  animation: giftAttention 4s ease-in-out infinite;
  overflow: hidden;
}
.gift-widget::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
  background: linear-gradient(90deg, transparent, #00d4ff, #b44fff, transparent);
  animation: scanline 2.8s linear infinite;
}
@keyframes scanline {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
@keyframes giftAttention {
  0%, 70%, 100% { transform: scale(1);    box-shadow: 0 0 24px rgba(0,212,255,0.28), inset 0 0 20px rgba(0,212,255,0.05); }
  77%           { transform: scale(1.03); box-shadow: 0 0 40px rgba(0,212,255,0.6),  inset 0 0 20px rgba(0,212,255,0.12); }
  84%           { transform: scale(1);    box-shadow: 0 0 24px rgba(0,212,255,0.28), inset 0 0 20px rgba(0,212,255,0.05); }
  91%           { transform: scale(1.03); box-shadow: 0 0 40px rgba(0,212,255,0.6),  inset 0 0 20px rgba(0,212,255,0.12); }
}

.gift-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.gift-icon {
  font-size: 32px;
  animation: giftIconSpin 5s ease-in-out infinite;
}
@keyframes giftIconSpin {
  0%, 85%, 100% { transform: rotate(0deg) scale(1); }
  88%           { transform: rotate(-12deg) scale(1.15); }
  92%           { transform: rotate(12deg)  scale(1.15); }
  96%           { transform: rotate(0deg)   scale(1); }
}
.gift-title {
  font-family: 'Exo 2', sans-serif;
  font-size: 21px;
  font-weight: 800;
  color: #00d4ff;
  letter-spacing: 1px;
  text-shadow: 0 0 10px rgba(0,212,255,0.7);
  text-transform: uppercase;
}
.gift-divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.5), transparent);
  margin: 10px 0;
}
.gift-line1 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px;
  font-weight: 600;
  color: #ffffff;
  letter-spacing: 1px;
  text-transform: uppercase;
  opacity: 0.9;
}
.gift-line2 {
  font-family: 'Exo 2', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: #b44fff;
  letter-spacing: 1px;
  text-transform: uppercase;
  text-shadow: 0 0 8px rgba(180,79,255,0.6);
  margin-top: 4px;
}

/* ── CREATOR CODE BANNER ── */
.creator-banner {
  position: absolute;
  bottom: 48px;
  left: 32px;
  right: 32px;
  z-index: 10;
  background: rgba(0,0,0,0.88);
  border: 2px solid rgba(255,215,0,0.45);
  border-radius: 4px;
  padding: 26px 32px 22px;
  clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
  box-shadow: 0 0 40px rgba(255,215,0,0.25), 0 0 80px rgba(255,215,0,0.10), inset 0 0 30px rgba(255,215,0,0.04);
  overflow: hidden;
}
.creator-banner::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
  background: linear-gradient(90deg, transparent 0%, #ffd700 20%, #fffacd 50%, #ffd700 80%, transparent 100%);
}
.creator-banner::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent 0%, rgba(255,215,0,0.5) 50%, transparent 100%);
}
.banner-use-code {
  font-family: 'Rajdhani', sans-serif;
  font-size: 24px;
  font-weight: 600;
  color: rgba(255,255,255,0.75);
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.banner-code-wrap {
  position: relative;
  display: inline-block;
  overflow: hidden;
}
.banner-code {
  font-family: 'Exo 2', sans-serif;
  font-size: 72px;
  font-weight: 900;
  color: #ffd700;
  letter-spacing: 8px;
  text-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,215,0,0.5), 0 0 80px rgba(255,215,0,0.2);
  line-height: 1;
  position: relative;
  z-index: 1;
}
.banner-code-wrap::after {
  content: '';
  position: absolute;
  top: -10%; left: -120%;
  width: 60%; height: 120%;
  background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.18) 45%, rgba(255,255,255,0.45) 50%, rgba(255,255,255,0.18) 55%, transparent 70%);
  z-index: 2;
  animation: shimmerSweep 3.2s ease-in-out infinite;
  pointer-events: none;
}
@keyframes shimmerSweep {
  0%        { left: -120%; }
  40%, 100% { left: 160%;  }
}
.banner-shop-text {
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px;
  font-weight: 500;
  color: rgba(255,215,0,0.65);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 6px;
}

/* ── VIGNETTE ── */
.vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.35) 100%);
  pointer-events: none;
  z-index: 2;
}

</style>
</head>
<body>
<div class="overlay-root">

  <canvas id="particleCanvas"></canvas>
  <div class="vignette"></div>
  <div class="stripe-left"></div>
  <div class="stripe-right"></div>

  <!-- Corner TL -->
  <div class="corner corner-tl">
    <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow-tl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <linearGradient id="g-tl" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#b44fff;stop-opacity:1"/>
          <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
        </linearGradient>
      </defs>
      <g filter="url(#glow-tl)" fill="none" stroke="url(#g-tl)" stroke-width="2.5">
        <polyline points="0,80 0,0 80,0" opacity="1"/>
        <polyline points="0,110 0,0 110,0" opacity="0.5"/>
        <polyline points="20,80 20,20 80,20" opacity="0.35"/>
        <polyline points="40,70 40,40 70,40" opacity="0.2"/>
      </g>
      <circle cx="0" cy="0" r="6" fill="#b44fff" opacity="0.9" filter="url(#glow-tl)"/>
    </svg>
  </div>

  <!-- Corner TR -->
  <div class="corner corner-tr">
    <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g-tr" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1"/>
          <stop offset="100%" style="stop-color:#b44fff;stop-opacity:0"/>
        </linearGradient>
      </defs>
      <g fill="none" stroke="url(#g-tr)" stroke-width="2.5">
        <polyline points="0,80 0,0 80,0" opacity="1"/>
        <polyline points="0,110 0,0 110,0" opacity="0.5"/>
        <polyline points="20,80 20,20 80,20" opacity="0.35"/>
        <polyline points="40,70 40,40 70,40" opacity="0.2"/>
      </g>
      <circle cx="0" cy="0" r="6" fill="#00d4ff" opacity="0.9"/>
    </svg>
  </div>

  <!-- Corner BL -->
  <div class="corner corner-bl">
    <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g-bl" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1"/>
          <stop offset="100%" style="stop-color:#b44fff;stop-opacity:0"/>
        </linearGradient>
      </defs>
      <g fill="none" stroke="url(#g-bl)" stroke-width="2.5">
        <polyline points="0,80 0,0 80,0" opacity="1"/>
        <polyline points="0,110 0,0 110,0" opacity="0.5"/>
        <polyline points="20,80 20,20 80,20" opacity="0.35"/>
      </g>
      <circle cx="0" cy="0" r="6" fill="#00d4ff" opacity="0.9"/>
    </svg>
  </div>

  <!-- Corner BR -->
  <div class="corner corner-br">
    <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g-br" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1"/>
          <stop offset="100%" style="stop-color:#b44fff;stop-opacity:0"/>
        </linearGradient>
      </defs>
      <g fill="none" stroke="url(#g-br)" stroke-width="2.5">
        <polyline points="0,80 0,0 80,0" opacity="1"/>
        <polyline points="0,110 0,0 110,0" opacity="0.5"/>
        <polyline points="20,80 20,20 80,20" opacity="0.35"/>
      </g>
      <circle cx="0" cy="0" r="6" fill="#ffd700" opacity="0.9"/>
    </svg>
  </div>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="live-pill">
      <div class="live-dot"></div>
      <span class="live-text">LIVE</span>
    </div>
    <div class="brand-logo">
      <span class="brand-name">PAUL_FMP</span>
      <span class="brand-sub">FORTNITE</span>
    </div>
  </div>

  <!-- FOLLOW BADGE -->
  <div class="follow-badge">
    <span class="badge-icon">👍</span>
    <span class="badge-text">FOLLOW FOR MORE!</span>
  </div>

  <!-- GIFT WIDGET -->
  <div class="gift-widget">
    <div class="gift-header">
      <span class="gift-icon">🎁</span>
      <span class="gift-title">GIFT A ROSE = SHOUTOUT!</span>
    </div>
    <div class="gift-divider"></div>
    <div class="gift-line1">Drop a Gift to Support!</div>
    <div class="gift-line2">⚡ Every Gift Gets Noticed ⚡</div>
  </div>

  <!-- CREATOR CODE BANNER -->
  <div class="creator-banner">
    <div class="banner-use-code">USE CODE</div>
    <div class="banner-code-wrap">
      <div class="banner-code">PAUL_FMP</div>
    </div>
    <div class="banner-shop-text">in the Fortnite Item Shop</div>
  </div>

</div><!-- /overlay-root -->

<script>
(function() {
  const canvas = document.getElementById('particleCanvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = 1080;
  canvas.height = 1920;
  const W = 1080, H = 1920;
  const PALETTE = ['#b44fff','#00d4ff','#ffffff','#ffd700'];
  const CR = 300;

  function spawnPos() {
    const r = Math.random();
    let x, y;
    if      (r < 0.25) { x = Math.random() * CR * 1.5;     y = Math.random() * CR * 1.5; }
    else if (r < 0.50) { x = W - Math.random() * CR * 1.5; y = Math.random() * CR * 1.5; }
    else if (r < 0.75) { x = Math.random() * CR * 1.5;     y = H - Math.random() * CR * 1.5; }
    else               { x = W - Math.random() * CR * 1.5; y = H - Math.random() * CR * 1.5; }
    return { x, y };
  }

  class Particle {
    constructor() { this.reset(true); }
    reset(init) {
      const p = spawnPos();
      this.x = p.x; this.y = p.y;
      this.size  = 1.2 + Math.random() * 2.8;
      this.color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
      this.alpha = init ? Math.random() * 0.7 : 0;
      this.targetAlpha = 0.3 + Math.random() * 0.55;
      this.vx = (Math.random() - 0.5) * 0.45;
      this.vy = (Math.random() - 0.5) * 0.45 - 0.12;
      this.life = 0;
      this.maxLife = 220 + Math.random() * 280;
      this.fadeIn  = 40;
      this.shape   = Math.random() < 0.35 ? 'diamond' : 'circle';
    }
    update() {
      this.life++;
      this.x += this.vx; this.y += this.vy;
      if (this.life < this.fadeIn) {
        this.alpha = (this.life / this.fadeIn) * this.targetAlpha;
      } else if (this.life > this.maxLife - 60) {
        this.alpha = ((this.maxLife - this.life) / 60) * this.targetAlpha;
      }
      if (this.life >= this.maxLife) this.reset(false);
    }
    draw(ctx) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.fillStyle   = this.color;
      ctx.shadowBlur  = 8;
      ctx.shadowColor = this.color;
      if (this.shape === 'diamond') {
        const s = this.size * 1.4;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y - s); ctx.lineTo(this.x + s, this.y);
        ctx.lineTo(this.x, this.y + s); ctx.lineTo(this.x - s, this.y);
        ctx.closePath(); ctx.fill();
      } else {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  const particles = Array.from({ length: 90 }, () => new Particle());
  function loop() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(ctx); });
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
