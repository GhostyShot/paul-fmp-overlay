  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Barlow Condensed';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"3b088dba-7358-43f1-b076-053affc91371\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Barlow Condensed';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"0587db15-cada-4e04-90f8-7bf7fa2c51bf\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Barlow Condensed';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"5ee4ecd2-bc8c-49cf-950d-b9cb70f17299\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Barlow Condensed';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"95679163-37da-4b9f-a3e4-52d53d62e863\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Barlow Condensed';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"ac2b8e23-2c6a-402a-aab2-44ac20d96096\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n* { margin:0; padding:0; box-sizing:border-box; }\n\nhtml, body {\n  width:100%; height:100%;\n  background:transparent;\n  display:flex; align-items:center; justify-content:center;\n  overflow:hidden;\n}\n\n.stage {\n  position:relative;\n  width:1080px; height:1920px;\n  transform-origin:top left;\n  background:transparent;\n  overflow:hidden;\n}\n\n.game-bg { display:none; }\n\n/* ── CORNER BRACKETS ── */\n.corner {\n  position:absolute;\n  width:80px; height:80px;\n  pointer-events:none;\n}\n.corner::before, .corner::after {\n  content:'';\n  position:absolute;\n  background:#fff;\n}\n/* TL */\n.c-tl { top:40px; left:40px; }\n.c-tl::before { top:0; left:0; width:4px; height:80px; }\n.c-tl::after  { top:0; left:0; width:80px; height:4px; }\n/* TR */\n.c-tr { top:40px; right:40px; }\n.c-tr::before { top:0; right:0; width:4px; height:80px; }\n.c-tr::after  { top:0; right:0; width:80px; height:4px; }\n/* BL */\n.c-bl { bottom:40px; left:40px; }\n.c-bl::before { bottom:0; left:0; width:4px; height:80px; }\n.c-bl::after  { bottom:0; left:0; width:80px; height:4px; }\n/* BR */\n.c-br { bottom:40px; right:40px; }\n.c-br::before { bottom:0; right:0; width:4px; height:80px; }\n.c-br::after  { bottom:0; right:0; width:80px; height:4px; }\n\n/* Thin border lines along edges */\n.edge-line {\n  position:absolute;\n  background:rgba(255,255,255,.12);\n  pointer-events:none;\n}\n.edge-t { top:0; left:0; right:0; height:1px; }\n.edge-b { bottom:0; left:0; right:0; height:1px; }\n.edge-l { top:0; left:0; bottom:0; width:1px; }\n.edge-r { top:0; right:0; bottom:0; width:1px; }\n\n/* ── TOP – Channel name ── */\n.top-section {\n  position:absolute;\n  top:52px; left:52px; right:52px;\n  display:flex; align-items:flex-start; justify-content:space-between;\n}\n\n.channel-block {\n  display:flex; flex-direction:column; gap:2px;\n}\n.channel-sub {\n  font-family:'Barlow Condensed',sans-serif;\n  font-size:20px; font-weight:700;\n  letter-spacing:.4em; color:#fff; opacity:.35;\n  text-transform:uppercase;\n}\n.channel-name {\n  font-family:'Barlow Condensed',sans-serif;\n  font-size:96px; font-weight:900; line-height:.88;\n  letter-spacing:.02em; color:#fff;\n  text-transform:uppercase;\n}\n.channel-name .sep { color:rgba(255,255,255,.25); }\n\n/* Live pill */\n.live-pill {\n  display:flex; align-items:center; gap:10px;\n  border:2px solid #fff;\n  padding:10px 22px;\n  margin-top:10px;\n}\n.live-pill .dot {\n  width:9px; height:9px; border-radius:50%; background:#fff;\n  animation:blink 1.4s ease-in-out infinite;\n}\n.live-pill .ltxt {\n  font-family:'Barlow Condensed',sans-serif;\n  font-size:26px; font-weight:900; letter-spacing:.3em; color:#fff;\n}\n@keyframes blink { 0%,100%{opacity:1}50%{opacity:.2} }\n\n/* ── TikTok handle (mid-bottom of top area) ── */\n.tiktok-row {\n  position:absolute;\n  top:230px; left:52px;\n  display:flex; align-items:center; gap:14px;\n}\n.tt-icon {\n  width:36px; height:36px;\n  border:1.5px solid rgba(255,255,255,.3);\n  border-radius:8px;\n  display:flex; align-items:center; justify-content:center;\n}\n.tt-handle {\n  font-family:'Barlow Condensed',sans-serif;\n  font-size:32px; font-weight:700;\n  letter-spacing:.06em; color:#fff; opacity:.5;\n}\n\n/* ── BOTTOM FADE ── */\n.bottom-fade { display:none; }\n\n/* ── CREATOR CODE CARD ── */\n.creator-card {\n  position:absolute;\n  top:300px; left:52px; right:52px;\n  background:#fff;\n  padding:44px 56px 48px;\n}\n\n/* Animated top accent line */\n.creator-card::before {\n  content:'';\n  position:absolute; top:0; left:0; right:0; height:4px;\n  background:#000;\n  animation:accentPulse 3s ease-in-out infinite;\n}\n@keyframes accentPulse {\n  0%,100%{ opacity:1; }\n  50%{ opacity:.5; }\n}\n\n.cc-use {\n  font-family:'Barlow Condensed',sans-serif;\n  font-size:22px; font-weight:700;\n  letter-spacing:.45em; color:#000; opacity:.4;\n  text-transform:uppercase; margin-bottom:4px;\n}\n\n.cc-code-row {\n  display:flex; align-items:flex-end; justify-content:space-between;\n  gap:16px;\n}\n\n.cc-code {\n  font-family:'Barlow Condensed',sans-serif;\n  font-size:120px; font-weight:900; line-height:.85;\n  letter-spacing:.015em; color:#000; text-transform:uppercase;\n}\n.cc-code .sep { color:rgba(0,0,0,.2); }\n\n/* Bolt icon in black */\n.cc-bolt {\n  flex-shrink:0;\n  padding-bottom:6px;\n}\n.cc-bolt svg {\n  filter:drop-shadow(0 2px 8px rgba(0,0,0,.12));\n}\n\n.cc-footer {\n  margin-top:18px;\n  display:flex; align-items:center; justify-content:space-between;\n}\n.cc-footer-text {\n  font-family:'Barlow',sans-serif;\n  font-size:20px; font-weight:600;\n  color:#000; opacity:.35; letter-spacing:.01em;\n}\n.cc-shop-tag {\n  font-family:'Barlow Condensed',sans-serif;\n  font-size:18px; font-weight:700;\n  letter-spacing:.25em; color:#000; opacity:.25;\n  text-transform:uppercase;\n}\n\n/* Subtle sweep on white card */\n.card-sweep {\n  position:absolute; inset:0; overflow:hidden; pointer-events:none;\n}\n.card-sweep::after {\n  content:'';\n  position:absolute; top:0; left:-100%; width:60%; height:100%;\n  background:linear-gradient(to right, transparent, rgba(255,255,255,.6), transparent);\n  animation:cardSweep 4s ease-in-out infinite;\n}\n@keyframes cardSweep {\n  0%{ left:-60%; }\n  60%,100%{ left:120%; }\n}\n\n/* ── TWEAKS ── */\n#tweaks-panel {\n  display:none;\n  position:fixed; bottom:24px; right:24px;\n  background:rgba(5,5,5,.97);\n  border:1.5px solid rgba(255,255,255,.2);\n  border-radius:12px; padding:22px 24px;\n  width:280px; z-index:9999;\n  font-family:'Barlow',sans-serif; color:#eee;\n  backdrop-filter:blur(16px);\n}\n#tweaks-panel h3 {\n  font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:900;\n  letter-spacing:.2em; color:#fff; margin-bottom:16px; text-transform:uppercase;\n}\n.tw-row { margin-bottom:12px; }\n.tw-row label { display:block; font-size:11px; letter-spacing:.12em; text-transform:uppercase; opacity:.45; margin-bottom:5px; }\n.tw-row.flex-row { display:flex; align-items:center; justify-content:space-between; }\n.tw-row.flex-row span { font-size:12px; opacity:.5; letter-spacing:.08em; text-transform:uppercase; }\n.tw-row input[type=checkbox] { width:16px; height:16px; accent-color:#fff; cursor:pointer; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"stage\" id=\"stage\">\n\n  <!-- Game BG -->\n  <div class=\"game-bg\">\n    <div class=\"hint\">GAMEPLAY AREA\n(transparent in OBS)<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Edge lines -->\n  <div class=\"edge-line edge-t\"><\u002Fdiv>\n  <div class=\"edge-line edge-b\"><\u002Fdiv>\n  <div class=\"edge-line edge-l\"><\u002Fdiv>\n  <div class=\"edge-line edge-r\"><\u002Fdiv>\n\n  <!-- Corners -->\n  <div class=\"corner c-tl\"><\u002Fdiv>\n  <div class=\"corner c-tr\"><\u002Fdiv>\n  <div class=\"corner c-bl\"><\u002Fdiv>\n  <div class=\"corner c-br\"><\u002Fdiv>\n\n  <!-- Top -->\n  <div class=\"top-section\">\n    <div class=\"channel-block\">\n      <span class=\"channel-sub\">Fortnite<\u002Fspan>\n      <span class=\"channel-name\">PAUL<span class=\"sep\">_<\u002Fspan>FMP<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"live-pill\">\n      <div class=\"dot\"><\u002Fdiv>\n      <span class=\"ltxt\">LIVE<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- TikTok -->\n  <div class=\"tiktok-row\" id=\"tiktok-row\">\n    <div class=\"tt-icon\">\n      <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\">\n        <path d=\"M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.79 1.53V6.76a4.85 4.85 0 01-1.02-.07z\" fill=\"rgba(255,255,255,0.5)\"><\u002Fpath>\n      <\u002Fsvg>\n    <\u002Fdiv>\n    <span class=\"tt-handle\">@paul_fmp<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- Bottom fade -->\n  <div class=\"bottom-fade\"><\u002Fdiv>\n\n  <!-- Creator Code Card -->\n  <div class=\"creator-card\" id=\"creator-card\">\n    <div class=\"card-sweep\"><\u002Fdiv>\n    <div style=\"position:relative;z-index:1;\">\n      <div class=\"cc-use\">Use Creator Code<\u002Fdiv>\n      <div class=\"cc-code-row\">\n        <div class=\"cc-code\">PAUL<span class=\"sep\">_<\u002Fspan>FMP<\u002Fdiv>\n        <div class=\"cc-bolt\">\n          <svg width=\"56\" height=\"72\" viewBox=\"0 0 56 72\" fill=\"none\">\n            <path d=\"M34 2L2 42h22L18 70 54 30H32L34 2z\" fill=\"#000\" opacity=\".85\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cc-footer\">\n        <span class=\"cc-footer-text\">Unterstützt mich im Item Shop<\u002Fspan>\n        <span class=\"cc-shop-tag\">Item Shop<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<!-- Tweaks -->\n<div id=\"tweaks-panel\">\n  <h3>Tweaks<\u002Fh3>\n\n  <div class=\"tw-row flex-row\">\n    <span>TikTok Handle<\u002Fspan>\n    <input type=\"checkbox\" checked=\"\" onchange=\"document.getElementById('tiktok-row').style.opacity=this.checked?'1':'0'\">\n  <\u002Fdiv>\n  <div class=\"tw-row flex-row\">\n    <span>Card Sweep<\u002Fspan>\n    <input type=\"checkbox\" checked=\"\" onchange=\"document.querySelector('.card-sweep').style.display=this.checked?'':'none'\">\n  <\u002Fdiv>\n  <div class=\"tw-row flex-row\">\n    <span>Ecken-Brackets<\u002Fspan>\n    <input type=\"checkbox\" checked=\"\" onchange=\"document.querySelectorAll('.corner').forEach(e=&gt;e.style.opacity=this.checked?'1':'0')\">\n  <\u002Fdiv>\n  <div class=\"tw-row flex-row\">\n    <span>Dunkle Card<\u002Fspan>\n    <input type=\"checkbox\" onchange=\"\n      const c=document.getElementById('creator-card');\n      c.style.background=this.checked?'#000':'#fff';\n      c.querySelectorAll('.cc-use,.cc-code,.cc-footer-text,.cc-shop-tag').forEach(e=&gt;e.style.color=this.checked?'#fff':'#000');\n      c.querySelector('.cc-code .sep').style.color=this.checked?'rgba(255,255,255,.2)':'rgba(0,0,0,.2)';\n      c.querySelector('.cc-bolt path').style.fill=this.checked?'#fff':'#000';\n    \">\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\nfunction scale() {\n  const s = document.getElementById('stage');\n  const sc = Math.min(window.innerWidth/1080, window.innerHeight/1920);\n  const ox = (window.innerWidth - 1080*sc)/2;\n  const oy = (window.innerHeight - 1920*sc)/2;\n  s.style.transform = `translate(${ox}px,${oy}px) scale(${sc})`;\n}\nscale();\nwindow.addEventListener('resize', scale);\n\nwindow.addEventListener('message', e => {\n  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').style.display = 'block';\n  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';\n});\nwindow.parent.postMessage({type:'__edit_mode_available'}, '*');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
